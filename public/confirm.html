<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Order - THE RAS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>

<section class="section">
  <div class="container">

    <!-- Progress -->
    <div class="progress-bar">
      <div class="step completed">1. Details</div>
      <div class="step active">2. Confirm</div>
      <div class="step">3. Done</div>
    </div>

    <h1>Order Confirmation</h1>

  <div class="confirmation-content">
    <p>Please review your order details before placing the order.</p>

    <!-- Personal Info -->
    <div class="card">
      <h3>Shipping Info</h3>
      <div id="userInfo"></div>
      <button onclick="editDetails()" class="btn btn-secondary">Edit</button>
    </div>

    <!-- Cart Items -->
    <div class="card">
      <h3>Items</h3>
      <div id="orderItems"></div>
    </div>

    <!-- Totals -->
    <div class="card">
      <h3>Summary</h3>
      <p>Subtotal: ₹<span id="subtotal"></span></p>
      <p>Shipping: ₹10</p>
      <p>Tax: ₹<span id="tax"></span></p>
      <h2>Total: ₹<span id="total"></span></h2>
    </div>

    <!-- Payment Method -->
    <h3>Select Payment Method</h3>
    
    <label>
      <input type="radio" name="paymentMethod" value="cod" checked>
      Cash on Delivery
    </label>
    
    <label>
      <input type="radio" name="paymentMethod" value="online">
      Pay Online
    </label>

    <!-- place order button -->
    </div>
  
      <button id="placeBtn" class="btn btn-primary btn-full" onclick="placeOrderNow()">
        Place Order
      </button>
  
      <div id="loading" class="loading hidden">Processing...</div>
  
    </div>
</section>

<script src="/js/config.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/api.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const SHIPPING = 10;
const TAX = 0.08;

function loadPage() {
  const shippingDetails = JSON.parse(localStorage.getItem("checkoutDetails"));
  const cart = getCart();

  if (!shippingDetails) {
    window.location.href = "/checkout.html";
    return;
  }

  if (cart.length === 0) {
    alert("Cart is empty");
    window.location.href = "/products.html";
    return;
  }
 
  // Display user info
  const userInfo = document.getElementById("userInfo");
  userInfo.innerHTML = `
    <p>${shippingDetails.firstName} ${shippingDetails.lastName}</p>
    <p>${shippingDetails.email}</p>
    <p>${shippingDetails.phone}</p>
    <p>${shippingDetails.address}, ${shippingDetails.city}, ${shippingDetails.state}</p>
  `;


  // Display order items
  const orderItems = document.getElementById("orderItems");
  orderItems.innerHTML = cart.map(item => `
    <div class="order-item">
      <span>${item.title} × ${item.quantity}</span>
      <span>₹${(item.price * item.quantity).toFixed(2)}</span>
    </div>
  `).join("");


  // Calculate totals
  const subtotal = getCartTotal();
  const tax = subtotal * TAX;
  const total = subtotal + SHIPPING + tax;

  subtotalSpan = document.getElementById("subtotal");
  taxSpan = document.getElementById("tax");
  totalSpan = document.getElementById("total");

  subtotalSpan.textContent = subtotal.toFixed(2);
  taxSpan.textContent = tax.toFixed(2);
  totalSpan.textContent = total.toFixed(2);
}

function editDetails() {
  window.location.href = "/checkout.html";
}


// ---------------------Place order--------------------------------------
async function placeOrderNow() {
  const btn = document.getElementById("placeBtn");
  const loader = document.getElementById("loading");

  btn.disabled = true;
  loader.classList.remove("hidden");

 // Get selected payment method
  const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
  // Get shipping details from localStorage
  const shippingDetails = JSON.parse(localStorage.getItem("checkoutDetails"));

  // Get cart items
  const cart = getCart();

  // Transform cart items to match backend format
  const products= cart.map(item =>({
  productId: item._id,
  quantity: item.quantity

  }))

  // Prepare order data
  const orderData = {
    shippingDetails,
    products,
    paymentMethod
  };

  const res = await placeOrder(orderData);

  if (!res.success) {
    alert("Order creation failed");
    return;
  }

  // COD order
  if (paymentMethod === "cod") {

    alert("Order placed successfully!");
    localStorage.removeItem("cart");
    window.location.href = "/orders.html";
    return;

  }

  // Online payment
  openRazorpay(res.razorpayOrder);

}

// Razorpay integration
function openRazorpay(order) {

  const options = {

    key: "rzp_live_SPcLScqWZHohsr", // replace with your key

    amount: order.amount,

    currency: order.currency,

    order_id: order.id,

    name: "THE RAS",

    description: "Order Payment",

    handler: async function (response) {

      await verifyPayment(response);

    }

  };

  const rzp = new Razorpay(options);

  rzp.open();

}

// Verify payment on the server
async function verifyPayment(paymentData) {

  const res = await fetch(`${API_BASE_URL}/payment/verify-payment`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    credentials: "include",

    body: JSON.stringify(paymentData)

  });


  const data = await res.json();


  if (data.success) {

    alert("Payment Successful 🎉");

    localStorage.removeItem("cart");

    window.location.href = "/orders.html";

  } else {

    alert("Payment verification failed");

  }

}

loadPage();
</script>

</body>
</html>
