<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - THE RAS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>

<section class="section">
  <div class="container">

    <!-- Progress Indicator -->
    <div class="progress-bar">
      <div class="step active">1. Details</div>
      <div class="step">2. Confirm</div>
      <div class="step">3. Done</div>
    </div>

    <h1 class = "checkout-title">Shipping Details</h1>

    <form id="checkoutForm" class="checkout-form">

      <input type="text" id="firstName" placeholder="First Name" required>
      <input type="text" id="lastName" placeholder="Last Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="tel" id="phone" placeholder="Phone" required>
      <input type="text" id="address" placeholder="Street Address" required>
      <input type="text" id="city" placeholder="City" required>
      <input type="text" id="state" placeholder="State" required>
      <input type="text" id="zipCode" placeholder="ZIP Code" required>
      <input type="text" id="country" value="India" required>

      <button class="btn btn-primary btn-full">
        Continue to Confirmation →
      </button>

    </form>

  </div>
</section>

<script>
document.getElementById("checkoutForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    firstName: firstName.value.trim(),
    lastName: lastName.value.trim(),
    email: email.value.trim(),
    phone: phone.value.trim(),
    address: address.value.trim(),
    city: city.value.trim(),
    state: state.value.trim(),
    zipCode: zipCode.value.trim(),
    country: country.value.trim()
  };

  localStorage.setItem("checkoutDetails", JSON.stringify(data));
  window.location.href = "/confirm.html";
});
</script>

</body>
</html>
