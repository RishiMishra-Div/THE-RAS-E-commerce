<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - THE RAS</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>THE RAS</h2>
       <a class="role-badge" href="/">Back to store</a>
    </div>

    <nav class="sidebar-menu">
      <a href="#" class="active">🏠 Dashboard</a>
      <a href="/adminPanel/addProduct.html">➕ Add Product</a>
      <a href="/adminPanel/admin-manage-products.html">🛍 Manage Products</a>
      <!-- <a href="/adminPanel/categories.html">📂 Manage Categories</a> -->
      <a href="/adminPanel/admin-orders.html">📄 Manage Orders</a>
      <a href="/adminPanel/admin-users.html">👤 Manage Users</a>
    </nav>

    <button id="logoutBtn" class="logout-btn">Logout</button>
  </aside>


  <!-- Main Content -->
  <main class="main-content">
    <header class="admin-header">
      <h1>Admin Dashboard</h1>
      <p>Manage your store from one place 🚀</p>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>Total Products</h3>
        <span id="statProducts"></span>
      </div>

      <div class="stat-card">
        <h3>Total Orders</h3>
        <span id="statOrders"></span>
      </div>

      <div class="stat-card">
        <h3>Total Users</h3>
        <span id="statUsers"></span>
      </div>

      <div class="stat-card">
        <h3>Total Revenue</h3>
        <span id="statRevenue"></span>
      </div>
    </section>

    <section class="recent-orders">
      <h2>Recent Orders</h2>
      <p>(Soon when order system added)</p>
    </section>
  </main>
  
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script>
    async function protectAdminPage() {
      const user = await getCurrentUser();

      if (!user || user.role !== "admin") {
        alert("Unauthorized access. Redirecting...");
        window.location.href = "/";
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", () => logout());

    protectAdminPage();


    // TODO: Fetch and display stats (products, orders, users, revenue) using API calls
    async function displayProductCount() {
        try {
          // get products from API
          const products = await getProducts();
      
          // count products
          const totalProducts = products.length;
      
          // display in HTML
          document.getElementById("statProducts").textContent = totalProducts;
      
        } catch (error) {
          console.error("Error fetching products:", error);
        }
   }



        
    //count users 
    let allUsers = []; // declare globally
    
    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE_URL}/users/allUsers`, {
          credentials: "include"
        });
    
        const data = await res.json();
    
        if (!data.success) {
          alert("Failed to load users");
          return;
        }
    
        allUsers = data.users; // store globally
    
        // count users
        const totalUsers = allUsers.length;
    
        // display count in dashboard
        document.getElementById("statUsers").textContent = totalUsers;
    
      } catch (error) {
        console.error("Error loading users:", error);
        alert("Error loading users");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadUsers();
      displayProductCount();
    });
  </script>

</body>
</html>
